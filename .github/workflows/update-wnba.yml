name: Update live WNBA Points Props

on:
  workflow_dispatch:
  schedule:
    # Runs 4 times per day.
    # GitHub cron uses UTC, so Eastern time may shift by 1 hour with daylight saving time.
    - cron: "15 13,16,19,22 * * *"

permissions:
  contents: write

concurrency:
  group: update-wnba-props
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 lxml

      - name: Update PrizePicks Board
        id: prizepicks
        continue-on-error: true
        run: |
          python scripts/import_prizepicks.py

      - name: Show PrizePicks fallback warning
        if: steps.prizepicks.outcome == 'failure'
        run: |
          echo "::warning::PrizePicks returned an error or rate limit. Keeping the previous data/lines.json file and continuing."

      - name: Update Player Stats
        run: |
          python scripts/update_stats.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required_files = [
              Path("data/lines.json"),
              Path("data/props.json"),
          ]

          for path in required_files:
              if not path.exists():
                  raise FileNotFoundError(f"Missing required file: {path}")

              with path.open("r", encoding="utf-8") as file:
                  json.load(file)

              print(f"Valid JSON: {path}")
          PY

      - name: Commit Updated Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto update WNBA props"
            git pull --rebase origin main
            git push origin main
          fi
