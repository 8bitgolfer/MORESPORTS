name: Update WNBA Sportsbook Points Props

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional slate date (YYYY-MM-DD); leave blank for today"
        required: false
        type: string

  schedule:
    # Runs around 11:00 AM and 5:00 PM Eastern during daylight saving time.
    - cron: "0 15,21 * * *"

permissions:
  contents: write

concurrency:
  group: update-wnba-sportsbook-props
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      WNBA_DATE: ${{ github.event.inputs.date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nba_api pandas requests

      - name: Verify Odds API secret
        run: |
          python - <<'PY'
          import os

          key = os.environ.get("ODDS_API_KEY", "").strip()

          if not key:
              raise SystemExit("ODDS_API_KEY is missing from GitHub Secrets.")

          print("ODDS_API_KEY was found.")
          PY

      - name: Import DraftKings and FanDuel points lines
        id: sportsbook
        run: |
          python scripts/import_sportsbooks.py

      - name: Match players and calculate Last 5, Last 10, and H2H
        id: stats
        continue-on-error: true
        run: |
          python scripts/update_stats.py

      - name: Show stats timeout warning
        if: steps.stats.outcome == 'failure'
        run: |
          echo "::warning::The NBA/WNBA stats request timed out or failed. The new sportsbook lines will still be saved, but data/props.json will keep its previous successful stats until a later run succeeds."

      - name: Validate sportsbook lines JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/lines.json")

          if not path.exists():
              raise SystemExit("Missing data/lines.json")

          data = json.loads(path.read_text(encoding="utf-8"))

          if not isinstance(data, dict):
              raise SystemExit("data/lines.json must contain a JSON object")

          props = data.get("props")

          if not isinstance(props, list):
              raise SystemExit("data/lines.json is missing a valid props list")

          print(f"Valid data/lines.json with {len(props)} sportsbook lines.")
          PY

      - name: Validate props JSON when stats succeed
        if: steps.stats.outcome == 'success'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/props.json")

          if not path.exists():
              raise SystemExit("Missing data/props.json")

          data = json.loads(path.read_text(encoding="utf-8"))

          if not isinstance(data, dict):
              raise SystemExit("data/props.json must contain a JSON object")

          props = data.get("props")

          if not isinstance(props, list):
              raise SystemExit("data/props.json is missing a valid props list")

          print(f"Valid data/props.json with {len(props)} completed props.")
          PY

      - name: Confirm previous props file exists after stats failure
        if: steps.stats.outcome == 'failure'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/props.json")

          if not path.exists():
              raise SystemExit(
                  "Stats failed and no previous data/props.json exists to preserve."
              )

          json.loads(path.read_text(encoding="utf-8"))
          print("Previous data/props.json is valid and will be preserved.")
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/lines.json

          if [ "${{ steps.stats.outcome }}" = "success" ]; then
            git add data/props.json
          fi

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update WNBA sportsbook props"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Update summary
        if: always()
        run: |
          echo "## WNBA Prop Update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sportsbook import: **${{ steps.sportsbook.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Player statistics: **${{ steps.stats.outcome }}**" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.stats.outcome }}" = "failure" ]; then
            echo "- New DraftKings/FanDuel lines were saved." >> "$GITHUB_STEP_SUMMARY"
            echo "- Previous Last 5, Last 10, and H2H data was preserved." >> "$GITHUB_STEP_SUMMARY"
          fi
