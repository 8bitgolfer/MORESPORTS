name: Update WNBA points board

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"
    - cron: "15 16 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Import live PrizePicks WNBA Points board
        continue-on-error: true
        env:
          PRIZEPICKS_WNBA_LEAGUE_ID: ${{ secrets.PRIZEPICKS_WNBA_LEAGUE_ID }}
        run: python scripts/import_prizepicks.py

      - name: Match players to today's games and update stats
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: python scripts/update_stats.py

      - name: Commit updated data
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/lines.json data/props.json
          git diff --cached --quiet || git commit -m "Update WNBA Points board"
          git push
